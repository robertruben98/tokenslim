name: Docs

# Builds the mkdocs-material site from `docs/` and publishes it to GitHub Pages.
# The `--strict` build runs on every PR that touches the docs so a broken
# internal link fails the check; the deploy job only runs on push to main.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'

# Least privilege by default; the deploy job widens this for Pages only.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build site (strict)
        run: uv run --extra docs mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Publish to Pages
      id-token: write   # OIDC token required by deploy-pages
    # Serialize deploys without cancelling an in-progress publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
